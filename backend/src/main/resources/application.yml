server:
  port: 8080

spring:
  datasource:
    url: jdbc:mysql://127.0.0.1:3306/RabbitHole.fm?useUnicode=true&characterEncoding=utf-8&serverTimezone=Asia/Shanghai
    username: root
    password: 123456
    driver-class-name: com.mysql.cj.jdbc.Driver
  data:
    redis:
      host: 127.0.0.1
      port: 6379
      password: 123456
  web:
    resources:
      cache:
        period: 0

mybatis-plus:
  mapper-locations: classpath:/mapper/**/*.xml
  configuration:
    map-underscore-to-camel-case: true

netease:
  api-base: http://127.0.0.1:3000
  cookie: ""

mimo:
  api-base: https://api.xiaomimimo.com
  api-key: ${MIMO_API_KEY:}
  default-model: mimo-v2.5-tts
  default-voice: "冰糖"
  default-format: wav
  chat-model: mimo-v2-flash
  llm-timeout-ms: 3000

radio:
  default-channel: 19723756
  dj-trigger-seconds: 5

http:
  client:
    connect-timeout-ms: 10000
    read-timeout-ms: 30000
    write-timeout-ms: 30000
    call-timeout-ms: 35000
    slow-call-ms: 2000

app:
  logging:
    slow-request-ms: 1200

jwt:
  secret: RabbitHoleFm2026SecretKeyForHmacSha256Algorithm!!
  expire-seconds: 86400
