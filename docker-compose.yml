version: "3.8"
services:
  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    restart: unless-stopped

  netease-api:
    image: oven/bun:alpine
    container_name: netease-api
    command: bunx NeteaseCloudMusicApi@latest
    ports:
      - "3000:3000"
    environment:
      - PORT=3000
    restart: unless-stopped
